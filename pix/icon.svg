  <!-- Whiskers -->
  <line x1="14" y1="38" x2="30" y2="40" stroke="#3B2412" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="46" x2="30" y2="45" stroke="#3B2412" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="38" x2="70" y2="40" stroke="#3B2412" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="46" x2="70" y2="45" stroke="#3B2412" stroke-width="2" stroke-linecap="round"/>
</svg>
